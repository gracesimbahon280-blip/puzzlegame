<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>123 Fix Me</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@500&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00ff;
            --terminal-bg: #0a0a0f;
        }

        body {
            background-color: #020205;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 243, 255, 0.1) 0%, transparent 80%),
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 100%, 100% 4px, 3px 100%;
            color: white;
            font-family: 'Fira Code', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .ide-container {
            width: 750px;
            background: var(--terminal-bg);
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.2);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .ide-header {
            background: #111;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--neon-cyan);
            font-family: 'Orbitron', sans-serif;
        }

        #timer {
            font-size: 1.8rem;
            color: var(--neon-cyan);
            min-width: 120px;
            text-align: right;
        }

        .timer-danger { color: var(--neon-pink) !important; text-shadow: 0 0 10px var(--neon-pink); animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        .editor-main { display: flex; padding: 25px; min-height: 280px; background: rgba(0,0,0,0.3); }
        .line-numbers { color: #333; padding-right: 25px; text-align: right; font-size: 1.2rem; line-height: 2.8rem; }
        
        .code-area { flex-grow: 1; display: flex; flex-direction: column; gap: 10px; }

        .code-line {
            background: rgba(0, 243, 255, 0.03);
            padding: 12px 20px;
            border: 1px solid #222;
            border-radius: 4px;
            cursor: grab;
            color: var(--neon-cyan);
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
        }

        .code-line:hover { border-color: var(--neon-cyan); background: rgba(0, 243, 255, 0.1); }
        .code-line.dragging { opacity: 0.1; background: var(--neon-pink); }

        .terminal-output {
            background: #000;
            height: 120px;
            padding: 15px 25px;
            border-top: 2px solid var(--neon-cyan);
            font-size: 14px;
            color: #0f0;
            overflow-y: hidden;
            line-height: 1.6;
        }

        .footer { padding: 15px 25px; display: flex; justify-content: flex-end; background: #08080a; }

        #run-btn {
            background: transparent;
            color: var(--neon-cyan);
            border: 2px solid var(--neon-cyan);
            padding: 12px 40px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            cursor: pointer;
            letter-spacing: 2px;
        }

        #run-btn:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 20px var(--neon-cyan); }

        /* Shake Effect on Fail */
        .shake { animation: shakeEffect 0.4s; border-color: var(--neon-pink) !important; }
        @keyframes shakeEffect {
            0%, 100% { transform: translate(0,0); }
            20% { transform: translate(-15px, 0); }
            40% { transform: translate(15px, 0); }
            60% { transform: translate(-15px, 0); }
            80% { transform: translate(15px, 0); }
        }

        /* Overlay */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .hidden { display: none !important; }
        #start-btn { 
            background: none; border: 3px solid var(--neon-cyan); color: var(--neon-cyan);
            padding: 25px 60px; font-size: 2rem; font-family: 'Orbitron'; cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- AUDIO -->
    <audio id="bg-music" loop src="C:\puzzle\HAWAK MO ANG BEAT NEW TRENDING TIKTOK DANCE VIRAL (DJ JONAS).mp3"></audio> <!-- High Energy Beats -->
    <audio id="sfx-fail" src="C:\puzzle\Bawat piyesa-munimuni (best part only) [itMJ5OSRZpg].mp3"></audio>
    <audio id="sfx-win" src="C:\puzzle\Diva (diva is a female version of hustla) - Beyoncé [Edit Audio] (Tiktok Version) [caAEgtWELEM].mp3"></audio>

    <div id="start-screen" class="overlay">
        <h1 style="font-family: 'Orbitron'; font-size: 3rem; color: var(--neon-cyan); margin-bottom: 5px;">123 FIX ME</h1>
        <p style="color: #666; margin-bottom: 30px;">GUESS AND TRY TO PUT THE CORRECT ORDER OF CODE</p>
        <button id="start-btn">START GAME</button>
    </div>

    <div id="game-ui" class="ide-container hidden">
        <div class="ide-header">
            <div style="font-size: 14px;">SESSION: <span style="color:var(--neon-pink)">ACTIVE</span></div>
            <div id="timer">30.00</div>
        </div>

        <div class="editor-main">
            <div class="line-numbers">1<br>2<br>3<br>4<br>5</div>
            <div class="code-area" id="sort-area">
                <!-- Code Lines go here -->
            </div>
        </div>

        <div class="terminal-output" id="terminal">
            > SYSTEM READY FOR INPUT...<br>
            > AWAITING CODE SEQUENCE...
        </div>

        <div class="footer">
            <button id="run-btn">EXECUTE RUN</button>
        </div>
    </div>

    <script>
        const correct = ["<!DOCTYPE html>", "<html>", "<head>", "<title>", "<body>"];
        let timeLeft = 30.00;
        let timerId;
        const bgMusic = document.getElementById('bg-music');
        const terminal = document.getElementById('terminal');

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            bgMusic.play();
            bgMusic.volume = 0.4;
            loadLines();
            startTimer();
        });

        function loadLines() {
            const area = document.getElementById('sort-area');
            const scrambled = [...correct].sort(() => Math.random() - 0.5);
            scrambled.forEach(text => {
                const div = document.createElement('div');
                div.className = 'code-line';
                div.draggable = true;
                div.innerText = text;
                div.addEventListener('dragstart', () => div.classList.add('dragging'));
                div.addEventListener('dragend', () => div.classList.remove('dragging'));
                area.appendChild(div);
            });
        }

        function startTimer() {
            timerId = setInterval(() => {
                timeLeft -= 0.01;
                const clock = document.getElementById('timer');
                clock.innerText = timeLeft.toFixed(2);
                
                if (timeLeft <= 10) clock.classList.add('timer-danger');
                
                if (timeLeft <= 0) handleFinish(false, "CONNECTION TIMEOUT. CORE DESTROYED.");
            }, 10);
        }

        // Sort Logic
        const sortArea = document.getElementById('sort-area');
        sortArea.addEventListener('dragover', e => {
            e.preventDefault();
            const dragging = document.querySelector('.dragging');
            const afterElement = getAfterElement(e.clientY);
            if (afterElement == null) sortArea.appendChild(dragging);
            else sortArea.insertBefore(dragging, afterElement);
        });

        function getAfterElement(y) {
            const elements = [...sortArea.querySelectorAll('.code-line:not(.dragging)')];
            return elements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) return { offset: offset, element: child };
                else return closest;
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        // Execute Result
        document.getElementById('run-btn').addEventListener('click', () => {
            const current = [...document.querySelectorAll('.code-line')].map(el => el.innerText);
            terminal.innerHTML += `<br>> Scanning logic sectors...`;
            
            setTimeout(() => {
                if (JSON.stringify(current) === JSON.stringify(correct)) {
                    handleFinish(true, "YOU DID A GREAT JOB DIVA!!!.");
                } else {
                    handleFinish(false, "AWW, BETTER LUCK NEXT TIME :<");
                }
            }, 600);
        });

        function handleFinish(win, msg) {
            clearInterval(timerId);
            
            // STOP MUSIC IMMEDIATELY
            bgMusic.pause();
            bgMusic.currentTime = 0;

            if (win) {
                document.getElementById('sfx-win').play();
                terminal.innerHTML += `<br><span style="color:var(--neon-cyan)">> ${msg}</span>`;
                confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
                setTimeout(() => { alert("SUMAKSES SIYA!"); location.reload(); }, 1500);
            } else {
                // FAIL LOGIC
                document.getElementById('sfx-fail').play();
                document.getElementById('game-ui').classList.add('shake');
                terminal.innerHTML += `<br><span style="color:var(--neon-pink)">> ${msg}</span>`;
                setTimeout(() => { 
                    alert("FATAL ERROR: " + msg); 
                    location.reload(); 
                }, 1000);
            }
        }
    </script>
</body>
</html>
